# ============================================================
# AI 3D 模型生成插件 - 前端 Nginx 配置
# ============================================================
# 功能：
#   - 提供 Vue 3 SPA 静态文件服务
#   - 反向代理 /api/ 到插件后端 :8087
#   - 反向代理 /v1/ 到主后端 :8081
#   - 支持 HTML5 History 模式路由
#   - 启用 Gzip 压缩
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ========== Gzip 压缩 ==========
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ========== 主后端通用插件 API ==========
    location /v1/plugin/ {
        proxy_pass http://host.docker.internal:8081/v1/plugin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========== 主后端 COS API ==========
    location /v1/tencent-clouds/ {
        proxy_pass http://host.docker.internal:8081/v1/tencent-clouds/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========== 主后端文件/Meta API ==========
    location /v1/files {
        proxy_pass http://host.docker.internal:8081/v1/files;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/meta {
        proxy_pass http://host.docker.internal:8081/v1/meta;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========== 插件业务 API ==========
    location /api/ {
        proxy_pass http://ai-3d-generator-backend:8087/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========== SPA 路由支持 ==========
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========== 静态资源缓存 ==========
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========== 禁止访问隐藏文件 ==========
    location ~ /\. {
        deny all;
    }
}
